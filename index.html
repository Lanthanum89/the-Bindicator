<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Bindicator</title>
<meta name="theme-color" content="#6b2d8c">
<meta name="description" content="Never miss bin day again — West Berkshire Schedule 1 Thursday collection tracker.">
<meta property="og:title" content="The Bindicator">
<meta property="og:description" content="Never miss bin day again — West Berkshire Schedule 1 Thursday collection tracker.">
<meta property="og:image" content="graphics/mascot-hero.png">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
  @font-face {
    font-family: 'Quicksand';
    src: url('fonts/quicksand-variable.woff2') format('woff2-variations'),
         url('fonts/quicksand-variable.woff2') format('woff2');
    font-weight: 300 700;
    font-style: normal;
    font-display: swap;
  }

  :root {
    --purple: #6b2d8c;
    --green: #7cb342;
    --black: #1a1a1a;
    --orange: #e8720c;
    --neutral: #5b6472;
    --brand: #48505c;
    --brand-contrast: #ffffff;
    --bg: #f4f2f6;
    --card-bg: #ffffff;
    --text: #222222;
    --subtitle: #666666;
    --table-bg: #ffffff;
    --border: #eeeeee;
    --accent: var(--neutral);
    --accent-solid: var(--neutral);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --brand: #aeb6c2;
      --brand-contrast: #1a1626;
      --bg: #17121e;
      --card-bg: #241c2e;
      --text: #f2eef7;
      --subtitle: #b6a9c4;
      --table-bg: #201929;
      --border: #3a3145;
    }
  }

  /* Explicit user choice (remembered in localStorage) overrides the system
     preference above — the attribute selector's higher specificity wins
     regardless of source order or which way prefers-color-scheme falls. */
  :root[data-theme="dark"] {
    --brand: #aeb6c2;
    --brand-contrast: #1a1626;
    --bg: #17121e;
    --card-bg: #241c2e;
    --text: #f2eef7;
    --subtitle: #b6a9c4;
    --table-bg: #201929;
    --border: #3a3145;
  }
  :root[data-theme="light"] {
    --brand: #48505c;
    --brand-contrast: #ffffff;
    --bg: #f4f2f6;
    --card-bg: #ffffff;
    --text: #222222;
    --subtitle: #666666;
    --table-bg: #ffffff;
    --border: #eeeeee;
  }

  * { box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 17px;
    background: var(--bg);
    margin: 0;
    padding: 16px;
    color: var(--text);
    position: relative;
    overflow-x: hidden;
    transition: background 0.3s ease, color 0.3s ease;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    z-index: -1;
    background:
      radial-gradient(circle at 15% 20%, rgba(107, 45, 140, 0.16), transparent 40%),
      radial-gradient(circle at 85% 15%, rgba(124, 179, 66, 0.16), transparent 42%),
      radial-gradient(circle at 50% 95%, rgba(232, 114, 12, 0.12), transparent 45%);
    background-size: 180% 180%;
    animation: drift 24s ease-in-out infinite alternate;
  }

  @keyframes drift {
    0%   { background-position: 0% 0%, 100% 0%, 50% 100%; }
    100% { background-position: 25% 30%, 70% 50%, 65% 75%; }
  }

  .header-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 16px;
  }

  .theme-toggle {
    margin-left: auto;
    flex-shrink: 0;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--card-bg);
    font-size: 1.2rem;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s ease, background 0.3s ease;
  }
  .theme-toggle:hover {
    transform: scale(1.08);
  }
  .theme-toggle:active {
    transform: scale(0.95);
  }

  h1 {
    font-family: 'Quicksand', -apple-system, sans-serif;
    font-weight: 600;
    font-size: 2rem;
    margin: 0;
    color: var(--brand);
    cursor: pointer;
    display: inline-block;
    user-select: none;
  }

  .mascot-wrap {
    cursor: pointer;
    flex-shrink: 0;
    height: 84px;
  }
  #mascotImg {
    height: 100%;
    width: auto;
    display: block;
    animation: idle-bounce 3.2s ease-in-out infinite;
  }
  @keyframes idle-bounce {
    0%, 100% { transform: translateY(0) rotate(-2deg); }
    50%      { transform: translateY(-4px) rotate(2deg); }
  }
  .mascot-wrap.celebrate #mascotImg {
    animation-duration: 1.1s;
  }

  .spin-wobble { animation: spin-wobble-kf 0.7s ease; }
  @keyframes spin-wobble-kf {
    0%   { transform: rotate(0deg) scale(1); }
    30%  { transform: rotate(-15deg) scale(1.1); }
    60%  { transform: rotate(360deg) scale(1.1); }
    100% { transform: rotate(360deg) scale(1); }
  }

  .next-card {
    background: var(--card-bg);
    border-radius: 12px;
    padding: 18px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    margin-bottom: 20px;
    overflow: hidden;
    transition: background 0.3s ease;
  }
  .accent-bar {
    height: 6px;
    margin: -18px -18px 14px;
    background: var(--accent);
    transition: background 0.3s ease;
  }
  .timeline {
    position: relative;
    padding-left: 22px;
  }
  .timeline-item {
    position: relative;
    padding-bottom: 22px;
  }
  .timeline-item:last-child {
    padding-bottom: 0;
  }
  .timeline-item::after {
    content: "";
    position: absolute;
    left: -17px;
    top: 18px;
    bottom: -4px;
    width: 2px;
    background: var(--border);
  }
  .timeline-item:last-child::after {
    display: none;
  }
  .timeline-dot {
    position: absolute;
    left: -22px;
    top: 6px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--border);
  }
  .timeline-item.is-next .timeline-dot {
    width: 16px;
    height: 16px;
    left: -24px;
    top: 2px;
    background: var(--accent-solid);
    box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent-solid) 20%, transparent);
  }
  .timeline-date {
    font-family: 'Quicksand', sans-serif;
    font-weight: 600;
  }
  .timeline-item.is-next .timeline-date {
    font-size: 1.6rem;
    color: var(--accent-solid);
  }
  .timeline-item:not(.is-next) .timeline-date {
    font-size: 1.1rem;
    color: var(--subtitle);
    font-weight: 500;
  }
  .timeline-caption {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #888;
    margin: 2px 0 8px;
  }
  .timeline-icons {
    display: flex;
    gap: 6px;
    margin-top: 6px;
  }
  .bins {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .bin-tag {
    font-family: 'Quicksand', sans-serif;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.95rem;
    font-weight: 600;
    color: white;
  }
  .tag-icon {
    width: 22px;
    height: 22px;
    object-fit: contain;
    flex-shrink: 0;
  }
  .bin-food { background: var(--purple); }
  .bin-recycling { background: var(--green); }
  .bin-black { background: var(--black); }
  .warning {
    margin-top: 10px;
    font-size: 0.88rem;
    color: var(--orange);
    font-weight: 600;
  }
  .icon-key {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    margin-bottom: 12px;
    font-size: 0.82rem;
    color: var(--subtitle);
  }
  .icon-key-item {
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .icon-key-item img {
    width: 20px;
    height: 20px;
    object-fit: contain;
  }
  .toggle-btn {
    font-family: 'Quicksand', sans-serif;
    background: none;
    border: 1px solid var(--brand);
    color: var(--brand);
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    margin-bottom: 12px;
    transition: transform 0.15s ease, background 0.15s ease;
  }
  .toggle-btn:hover {
    background: var(--brand);
    color: var(--brand-contrast);
    transform: translateY(-1px);
  }
  .toggle-btn:active { transform: translateY(0) scale(0.97); }

  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--table-bg);
    border-radius: 8px;
    overflow: hidden;
    font-size: 0.95rem;
  }
  th, td {
    padding: 7px 6px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    color: var(--text);
  }
  th {
    font-family: 'Quicksand', sans-serif;
    background: color-mix(in srgb, var(--brand) 80%, var(--purple) 20%);
    color: var(--brand-contrast);
    font-size: 0.82rem;
  }
  td:first-child, th:first-child {
    text-align: left;
    padding-left: 10px;
  }
  .today-row {
    background: color-mix(in srgb, var(--brand) 12%, var(--table-bg));
    font-weight: 700;
  }
  .orange-row td:first-child { color: var(--orange); }
  #tableWrap { display: none; margin-top: 12px; }
  .bin-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 26px;
    height: 26px;
    transition: transform 0.2s ease;
    cursor: default;
  }
  .bin-icon img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  .bin-icon:hover {
    transform: scale(1.25) rotate(-8deg);
  }

  .bins .bin-tag {
    animation: pop-in 0.35s ease backwards;
  }
  .bins .bin-tag:nth-child(1) { animation-delay: 0.05s; }
  .bins .bin-tag:nth-child(2) { animation-delay: 0.15s; }
  .bins .bin-tag:nth-child(3) { animation-delay: 0.25s; }
  @keyframes pop-in {
    0% { opacity: 0; transform: scale(0.6) translateY(6px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }

  .today-banner {
    font-family: 'Quicksand', sans-serif;
    background: var(--orange);
    color: white;
    font-weight: 600;
    text-align: center;
    padding: 8px;
    border-radius: 8px;
    margin-bottom: 14px;
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  #confettiCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 999;
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
    }
  }
</style>
</head>
<body>

<div class="header-row">
  <div class="mascot-wrap" id="mascotWrap" role="button" tabindex="0" aria-label="Boop the bin">
    <img id="mascotImg" src="characters/food-full.png" alt="">
  </div>
  <h1 id="titleEl" role="button" tabindex="0" aria-label="The Bindicator (wobble it)">The Bindicator</h1>
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark/light mode" title="Toggle dark/light mode">🌙</button>
</div>
<canvas id="confettiCanvas"></canvas>

<div class="next-card" id="nextCard"></div>

<div class="icon-key">
  <span class="icon-key-item"><img src="characters/food-icon.png" alt="">Food waste</span>
  <span class="icon-key-item"><img src="characters/recycling-icon.png" alt="">Recycling &amp; garden</span>
  <span class="icon-key-item"><img src="characters/black-icon.png" alt="">Black bin</span>
</div>

<button class="toggle-btn" onclick="toggleTable()">Show all dates ▾</button>
<div id="tableWrap">
  <table>
    <thead>
      <tr><th>Date</th><th>Food</th><th>Recycling</th><th>Black bin</th></tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<script>
// [date, recycling, black, isChristmasPeriod] — food waste is every date
const data = [
  ["2026-04-02",0,1,0],["2026-04-09",1,0,0],["2026-04-16",0,0,0],["2026-04-23",1,1,0],
  ["2026-04-30",0,0,0],["2026-05-07",1,0,0],["2026-05-14",0,1,0],["2026-05-21",1,0,0],
  ["2026-05-28",0,0,0],["2026-06-04",1,1,0],["2026-06-11",0,0,0],["2026-06-18",1,0,0],
  ["2026-06-25",0,1,0],["2026-07-02",1,0,0],["2026-07-09",0,0,0],["2026-07-16",1,1,0],
  ["2026-07-23",0,0,0],["2026-07-30",1,0,0],["2026-08-06",0,1,0],["2026-08-13",1,0,0],
  ["2026-08-20",0,0,0],["2026-08-27",1,1,0],["2026-09-03",0,0,0],["2026-09-10",1,0,0],
  ["2026-09-17",0,1,0],["2026-09-24",1,0,0],["2026-10-01",0,0,0],["2026-10-08",1,1,0],
  ["2026-10-15",0,0,0],["2026-10-22",1,0,0],["2026-10-29",0,1,0],["2026-11-05",1,0,0],
  ["2026-11-12",0,0,0],["2026-11-19",1,1,0],["2026-11-26",0,0,0],["2026-12-03",1,0,0],
  ["2026-12-10",0,1,0],["2026-12-17",1,0,0],["2026-12-24",0,0,1],["2026-12-31",1,1,1],
  ["2027-01-07",0,0,1],["2027-01-14",1,0,1],["2027-01-21",0,1,0],["2027-01-28",1,0,0],
  ["2027-02-04",0,0,0],["2027-02-11",1,1,0],["2027-02-18",0,0,0],["2027-02-25",1,0,0],
  ["2027-03-04",0,1,0],["2027-03-11",1,0,0],["2027-03-18",0,0,0],["2027-03-25",1,1,0]
];

function fmtDate(d) {
  return d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
}

function fmtDateShort(d) {
  return d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'long' });
}

function buildBins(recycling, black) {
  let html = '<span class="bin-tag bin-food"><img class="tag-icon" src="characters/food-icon.png" alt="">Food waste</span>';
  if (recycling) html += '<span class="bin-tag bin-recycling"><img class="tag-icon" src="characters/recycling-icon.png" alt="">Recycling &amp; garden</span>';
  if (black) html += '<span class="bin-tag bin-black"><img class="tag-icon" src="characters/black-icon.png" alt="">Black bin</span>';
  return html;
}

// The black bin's brand colour is near-black, which reads fine as a solid
// badge (white-on-black) but nearly disappears as accent text/dot on the
// dark-mode card background — so the accent (not the badge) swaps to a
// lighter grey in dark mode to stay legible.
const PALETTE_LIGHT = { green: '#7cb342', black: '#1a1a1a', neutral: '#5b6472' };
const PALETTE_DARK = { green: '#7cb342', black: '#aeb6c2', neutral: '#9aa5b3' };

const THEME_KEY = 'bindicator-theme';

// The user's explicit toggle choice (if any) wins over the OS-level
// prefers-color-scheme, so every theme-aware bit of JS reads through here
// rather than checking matchMedia directly.
function currentTheme() {
  const saved = localStorage.getItem(THEME_KEY);
  if (saved === 'dark' || saved === 'light') return saved;
  return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}

function getPalette() {
  return currentTheme() === 'dark' ? PALETTE_DARK : PALETTE_LIGHT;
}

// Food waste goes out every collection, so it isn't informative as an accent
// colour — the accent instead highlights whichever *extra* bins are due this
// week (recycling/black), falling back to a plain neutral on food-only weeks.
function accentStops(recycling, black) {
  const PALETTE = getPalette();
  const stops = [];
  if (recycling) stops.push(PALETTE.green);
  if (black) stops.push(PALETTE.black);
  if (stops.length === 0) stops.push(PALETTE.neutral);
  return stops;
}

function gradientCss(stops) {
  return stops.length === 1 ? stops[0] : `linear-gradient(90deg, ${stops.join(', ')})`;
}

// Same precedence as accentStops: black bin wins over recycling, which wins
// over the plain food-only default, so the mascot always echoes whichever
// bin the accent bar/dot are currently highlighting.
function mascotFor(recycling, black) {
  if (black) return 'characters/black-full.png';
  if (recycling) return 'characters/recycling-full.png';
  return 'characters/food-full.png';
}

function nextCaption(days) {
  if (days === 0) return "Today · next up";
  if (days === 1) return "Tomorrow · next up";
  return `In ${days} days · next up`;
}

const MS_PER_DAY = 24 * 60 * 60 * 1000;

function buildTimelineItem(entry, isNext, today) {
  if (isNext) {
    const days = Math.round((entry.d.getTime() - today.getTime()) / MS_PER_DAY);
    return `
      <div class="timeline-item is-next">
        <span class="timeline-dot"></span>
        <div class="timeline-date">${fmtDateShort(entry.d)}</div>
        <div class="timeline-caption">${nextCaption(days)}</div>
        <div class="bins">${buildBins(entry.recycling, entry.black)}</div>
        ${entry.xmas ? '<div class="warning">⚠ Christmas period — council confirms exact date in December, this may shift</div>' : ''}
      </div>`;
  }
  return `
    <div class="timeline-item">
      <span class="timeline-dot"></span>
      <div class="timeline-date">${fmtDateShort(entry.d)}</div>
      <div class="timeline-icons">
        <span class="bin-icon food"><img src="characters/food-icon.png" alt="Food waste"></span>
        ${entry.recycling ? '<span class="bin-icon recycling"><img src="characters/recycling-icon.png" alt="Recycling"></span>' : ''}
        ${entry.black ? '<span class="bin-icon black"><img src="characters/black-icon.png" alt="Black bin"></span>' : ''}
      </div>
    </div>`;
}

function init() {
  const today = new Date();
  today.setHours(0,0,0,0);

  const upcoming = [];
  for (const row of data) {
    const d = new Date(row[0] + 'T00:00:00');
    if (d >= today) {
      upcoming.push({ d, recycling: row[1], black: row[2], xmas: row[3] });
      if (upcoming.length === 3) break;
    }
  }

  const card = document.getElementById('nextCard');
  const mascotWrap = document.getElementById('mascotWrap');
  if (upcoming.length) {
    const next = upcoming[0];
    const isToday = next.d.getTime() === today.getTime();
    const stops = accentStops(next.recycling, next.black);
    card.style.setProperty('--accent', gradientCss(stops));
    card.style.setProperty('--accent-solid', stops[stops.length - 1]);
    document.getElementById('mascotImg').src = mascotFor(next.recycling, next.black);
    card.innerHTML = `
      <div class="accent-bar"></div>
      ${isToday ? '<div class="today-banner">🚛 IT\'S BIN DAY! Bins out by 6am 🚛</div>' : ''}
      <div class="timeline">
        ${upcoming.map((entry, i) => buildTimelineItem(entry, i === 0, today)).join('')}
      </div>
    `;
    mascotWrap.classList.toggle('celebrate', isToday);
    if (isToday) launchConfetti();
  } else {
    card.innerHTML = '<div class="timeline-caption">No dates loaded</div><div class="timeline-date">Calendar ends 25 March 2027</div>';
  }

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = data.map(row => {
    const d = new Date(row[0] + 'T00:00:00');
    const isToday = d.getTime() === today.getTime();
    return `<tr class="${isToday ? 'today-row' : ''} ${row[3] ? 'orange-row' : ''}">
      <td>${d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })}</td>
      <td><span class="bin-icon food"><img src="characters/food-icon.png" alt="Food waste"></span></td>
      <td>${row[1] ? '<span class="bin-icon recycling"><img src="characters/recycling-icon.png" alt="Recycling"></span>' : ''}</td>
      <td>${row[2] ? '<span class="bin-icon black"><img src="characters/black-icon.png" alt="Black bin"></span>' : ''}</td>
    </tr>`;
  }).join('');
}

function launchConfetti() {
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const canvas = document.getElementById('confettiCanvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const colors = ['#6b2d8c', '#7cb342', '#1a1a1a', '#e8720c'];
  const pieces = Array.from({ length: 60 }, () => ({
    x: Math.random() * canvas.width,
    y: -20 - Math.random() * canvas.height * 0.3,
    size: 5 + Math.random() * 6,
    speed: 2 + Math.random() * 3,
    drift: (Math.random() - 0.5) * 2,
    rotation: Math.random() * 360,
    spin: (Math.random() - 0.5) * 10,
    color: colors[Math.floor(Math.random() * colors.length)]
  }));

  let frame = 0;
  function tick() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      p.y += p.speed;
      p.x += p.drift;
      p.rotation += p.spin;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation * Math.PI / 180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
      ctx.restore();
    });
    frame++;
    if (frame < 150) {
      requestAnimationFrame(tick);
    } else {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  }
  tick();
}

function wobble(el) {
  el.classList.remove('spin-wobble');
  void el.offsetWidth;
  el.classList.add('spin-wobble');
}

function onActivate(el, handler) {
  el.addEventListener('click', (e) => handler(e.currentTarget));
  el.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      handler(e.currentTarget);
    }
  });
}

onActivate(document.getElementById('titleEl'), wobble);
onActivate(document.getElementById('mascotWrap'), wobble);

function toggleTable() {
  const wrap = document.getElementById('tableWrap');
  const btn = document.querySelector('.toggle-btn');
  const showing = wrap.style.display === 'block';
  wrap.style.display = showing ? 'none' : 'block';
  btn.textContent = showing ? 'Show all dates ▾' : 'Hide all dates ▴';
}

function applyTheme(theme) {
  document.documentElement.dataset.theme = theme;
  document.getElementById('themeToggle').textContent = theme === 'dark' ? '☀️' : '🌙';
  const bg = getComputedStyle(document.documentElement).getPropertyValue('--bg').trim();
  document.querySelector('meta[name="theme-color"]').setAttribute('content', bg);
}

function toggleTheme() {
  const next = currentTheme() === 'dark' ? 'light' : 'dark';
  localStorage.setItem(THEME_KEY, next);
  applyTheme(next);
  init(); // recompute accent colours, which depend on the active theme
}

document.getElementById('themeToggle').addEventListener('click', toggleTheme);

applyTheme(currentTheme());
init();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch((err) => console.warn("SW registration failed:", err));
  });
}
</script>
