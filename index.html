<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Bindicator</title>
<meta name="theme-color" content="#6b2d8c">
<meta name="description" content="Never miss bin day again — West Berkshire Schedule 1 Thursday collection tracker.">
<meta property="og:title" content="The Bindicator">
<meta property="og:description" content="Never miss bin day again — West Berkshire Schedule 1 Thursday collection tracker.">
<meta property="og:image" content="graphics/mascot-hero.png">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
  @font-face {
    font-family: 'Fredoka';
    src: url('fonts/fredoka-variable.woff2') format('woff2-variations'),
         url('fonts/fredoka-variable.woff2') format('woff2');
    font-weight: 300 700;
    font-style: normal;
    font-display: swap;
  }

  :root {
    --purple: #6b2d8c;
    --green: #7cb342;
    --black: #1a1a1a;
    --orange: #e8720c;
    --bg: #f4f2f6;
    --card-bg: #ffffff;
    --text: #222222;
    --subtitle: #666666;
    --table-bg: #ffffff;
    --border: #eeeeee;
    --accent: var(--purple);
    --accent-solid: var(--purple);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #17121e;
      --card-bg: #241c2e;
      --text: #f2eef7;
      --subtitle: #b6a9c4;
      --table-bg: #201929;
      --border: #3a3145;
    }
  }

  * { box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    margin: 0;
    padding: 16px;
    color: var(--text);
    position: relative;
    overflow-x: hidden;
    transition: background 0.3s ease, color 0.3s ease;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    z-index: -1;
    background:
      radial-gradient(circle at 15% 20%, rgba(107, 45, 140, 0.16), transparent 40%),
      radial-gradient(circle at 85% 15%, rgba(124, 179, 66, 0.16), transparent 42%),
      radial-gradient(circle at 50% 95%, rgba(232, 114, 12, 0.12), transparent 45%);
    background-size: 180% 180%;
    animation: drift 24s ease-in-out infinite alternate;
  }

  @keyframes drift {
    0%   { background-position: 0% 0%, 100% 0%, 50% 100%; }
    100% { background-position: 25% 30%, 70% 50%, 65% 75%; }
  }

  .header-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  h1 {
    font-family: 'Fredoka', -apple-system, sans-serif;
    font-weight: 600;
    font-size: 1.5rem;
    margin: 0 0 4px;
    color: var(--purple);
    cursor: pointer;
    display: inline-block;
    user-select: none;
  }

  .mascot-wrap {
    cursor: pointer;
    flex-shrink: 0;
  }
  .mascot-bounce {
    transform-box: fill-box;
    transform-origin: center;
    animation: idle-bounce 3.2s ease-in-out infinite;
  }
  @keyframes idle-bounce {
    0%, 100% { transform: translateY(0) rotate(-2deg); }
    50%      { transform: translateY(-4px) rotate(2deg); }
  }
  .mascot-eyelid {
    transform-box: fill-box;
    transform-origin: center;
    animation: blink 4.6s ease-in-out infinite;
  }
  .mascot-eyelid:nth-of-type(2) { animation-delay: 0.12s; }
  @keyframes blink {
    0%, 90%, 100% { transform: scaleY(0); }
    94%           { transform: scaleY(1); }
  }
  .party-hat { display: none; }
  .mascot-wrap.celebrate .party-hat { display: block; }
  .mascot-wrap.celebrate .mascot-bounce { animation-duration: 1.1s; }

  .spin-wobble { animation: spin-wobble-kf 0.7s ease; }
  @keyframes spin-wobble-kf {
    0%   { transform: rotate(0deg) scale(1); }
    30%  { transform: rotate(-15deg) scale(1.1); }
    60%  { transform: rotate(360deg) scale(1.1); }
    100% { transform: rotate(360deg) scale(1); }
  }

  .subtitle {
    font-size: 0.85rem;
    color: var(--subtitle);
    margin-bottom: 4px;
  }

  .tagline {
    font-family: 'Fredoka', sans-serif;
    font-weight: 500;
    font-size: 0.9rem;
    color: var(--orange);
    margin: 0 0 16px;
    cursor: pointer;
    user-select: none;
  }
  .tagline:before { content: "✨ "; }
  .tagline:hover { text-decoration: underline; }

  .next-card {
    background: var(--card-bg);
    border-radius: 12px;
    padding: 18px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    margin-bottom: 20px;
    overflow: hidden;
    transition: background 0.3s ease;
  }
  .accent-bar {
    height: 6px;
    margin: -18px -18px 14px;
    background: var(--accent);
    transition: background 0.3s ease;
  }
  .next-card .label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #888;
    margin-bottom: 6px;
  }
  .next-card .date-row {
    display: flex;
    align-items: baseline;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .next-card .date {
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 1.4rem;
    color: var(--purple);
  }
  .days-chip {
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 0.75rem;
    padding: 3px 10px;
    border-radius: 20px;
    background: color-mix(in srgb, var(--accent-solid) 18%, transparent);
    color: var(--accent-solid);
    white-space: nowrap;
  }
  .bins {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .bin-tag {
    font-family: 'Fredoka', sans-serif;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: 600;
    color: white;
  }
  .bin-food { background: var(--purple); }
  .bin-recycling { background: var(--green); }
  .bin-black { background: var(--black); }
  .warning {
    margin-top: 10px;
    font-size: 0.8rem;
    color: var(--orange);
    font-weight: 600;
  }
  .toggle-btn {
    font-family: 'Fredoka', sans-serif;
    background: none;
    border: 1px solid var(--purple);
    color: var(--purple);
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    margin-bottom: 12px;
    transition: transform 0.15s ease, background 0.15s ease;
  }
  .toggle-btn:hover {
    background: var(--purple);
    color: white;
    transform: translateY(-1px);
  }
  .toggle-btn:active { transform: translateY(0) scale(0.97); }

  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--table-bg);
    border-radius: 8px;
    overflow: hidden;
    font-size: 0.85rem;
  }
  th, td {
    padding: 8px 6px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    color: var(--text);
  }
  th {
    font-family: 'Fredoka', sans-serif;
    background: var(--purple);
    color: white;
    font-size: 0.75rem;
  }
  td:first-child, th:first-child {
    text-align: left;
    padding-left: 10px;
  }
  .today-row {
    background: color-mix(in srgb, var(--purple) 12%, var(--table-bg));
    font-weight: 700;
  }
  .orange-row td:first-child { color: var(--orange); }
  #tableWrap { display: none; margin-top: 12px; }
  .bin-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 26px;
    height: 26px;
    border-radius: 6px;
    font-size: 0.9rem;
    transition: transform 0.2s ease;
    cursor: default;
  }
  .bin-icon.food { background: var(--purple); }
  .bin-icon.recycling { background: var(--green); }
  .bin-icon.black { background: var(--black); }
  .bin-icon:hover {
    transform: scale(1.25) rotate(-8deg);
  }

  .bins .bin-tag {
    animation: pop-in 0.35s ease backwards;
  }
  .bins .bin-tag:nth-child(1) { animation-delay: 0.05s; }
  .bins .bin-tag:nth-child(2) { animation-delay: 0.15s; }
  .bins .bin-tag:nth-child(3) { animation-delay: 0.25s; }
  @keyframes pop-in {
    0% { opacity: 0; transform: scale(0.6) translateY(6px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }

  .today-banner {
    font-family: 'Fredoka', sans-serif;
    background: var(--orange);
    color: white;
    font-weight: 600;
    text-align: center;
    padding: 8px;
    border-radius: 8px;
    margin-bottom: 14px;
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  #confettiCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 999;
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
    }
  }
</style>
</head>
<body>

<div class="header-row">
  <div class="mascot-wrap" id="mascotWrap" role="button" tabindex="0" aria-label="Boop the bin">
    <svg viewBox="0 -16 100 126" width="56" height="70" aria-hidden="true">
      <defs>
        <linearGradient id="mascotGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#6b2d8c"/>
          <stop offset="100%" stop-color="#6b2d8c"/>
        </linearGradient>
      </defs>
      <g class="mascot-bounce">
        <rect x="14" y="34" width="72" height="62" rx="16" fill="url(#mascotGrad)"/>
        <line x1="35" y1="46" x2="35" y2="86" stroke="rgba(255,255,255,0.35)" stroke-width="3"/>
        <line x1="50" y1="46" x2="50" y2="86" stroke="rgba(255,255,255,0.35)" stroke-width="3"/>
        <line x1="65" y1="46" x2="65" y2="86" stroke="rgba(255,255,255,0.35)" stroke-width="3"/>
        <rect x="10" y="14" width="80" height="22" rx="11" fill="var(--black)"/>
        <circle cx="38" cy="58" r="11" fill="#fff"/>
        <circle cx="62" cy="58" r="11" fill="#fff"/>
        <circle cx="38" cy="58" r="5" fill="#1a1a1a"/>
        <circle cx="62" cy="58" r="5" fill="#1a1a1a"/>
        <rect class="mascot-eyelid" x="27" y="47" width="22" height="22" fill="var(--purple)"/>
        <rect class="mascot-eyelid" x="51" y="47" width="22" height="22" fill="var(--purple)"/>
        <ellipse cx="30" cy="72" rx="5" ry="3" fill="#ff9fc2" opacity="0.5"/>
        <ellipse cx="70" cy="72" rx="5" ry="3" fill="#ff9fc2" opacity="0.5"/>
        <path d="M42 78 Q50 86 58 78" stroke="#fff" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        <g class="party-hat">
          <polygon points="50,-14 36,14 64,14" fill="var(--orange)"/>
          <circle cx="50" cy="-6" r="3" fill="#fff"/>
          <circle cx="44" cy="4" r="2.3" fill="#fff"/>
          <circle cx="56" cy="4" r="2.3" fill="#fff"/>
        </g>
      </g>
    </svg>
  </div>
  <h1 id="titleEl" role="button" tabindex="0" aria-label="The Bindicator (wobble it)">The Bindicator</h1>
</div>
<div class="subtitle">West Berkshire · Schedule 1 Thursday · never miss bin day again</div>
<p class="tagline" id="tagline" role="button" tabindex="0" aria-label="Show another tagline"></p>
<canvas id="confettiCanvas"></canvas>

<div class="next-card" id="nextCard"></div>

<button class="toggle-btn" onclick="toggleTable()">Show full calendar ▾</button>
<div id="tableWrap">
  <table>
    <thead>
      <tr><th>Date</th><th>Food</th><th>Recycling</th><th>Black bin</th></tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<script>
// [date, recycling, black, isChristmasPeriod] — food waste is every date
const data = [
  ["2026-04-02",0,1,0],["2026-04-09",1,0,0],["2026-04-16",0,0,0],["2026-04-23",1,1,0],
  ["2026-04-30",0,0,0],["2026-05-07",1,0,0],["2026-05-14",0,1,0],["2026-05-21",1,0,0],
  ["2026-05-28",0,0,0],["2026-06-04",1,1,0],["2026-06-11",0,0,0],["2026-06-18",1,0,0],
  ["2026-06-25",0,1,0],["2026-07-02",1,0,0],["2026-07-09",0,0,0],["2026-07-16",1,1,0],
  ["2026-07-23",0,0,0],["2026-07-30",1,0,0],["2026-08-06",0,1,0],["2026-08-13",1,0,0],
  ["2026-08-20",0,0,0],["2026-08-27",1,1,0],["2026-09-03",0,0,0],["2026-09-10",1,0,0],
  ["2026-09-17",0,1,0],["2026-09-24",1,0,0],["2026-10-01",0,0,0],["2026-10-08",1,1,0],
  ["2026-10-15",0,0,0],["2026-10-22",1,0,0],["2026-10-29",0,1,0],["2026-11-05",1,0,0],
  ["2026-11-12",0,0,0],["2026-11-19",1,1,0],["2026-11-26",0,0,0],["2026-12-03",1,0,0],
  ["2026-12-10",0,1,0],["2026-12-17",1,0,0],["2026-12-24",0,0,1],["2026-12-31",1,1,1],
  ["2027-01-07",0,0,1],["2027-01-14",1,0,1],["2027-01-21",0,1,0],["2027-01-28",1,0,0],
  ["2027-02-04",0,0,0],["2027-02-11",1,1,0],["2027-02-18",0,0,0],["2027-02-25",1,0,0],
  ["2027-03-04",0,1,0],["2027-03-11",1,0,0],["2027-03-18",0,0,0],["2027-03-25",1,1,0]
];

const TAGLINES = [
  "Bin there, done that.",
  "Trash talk, but make it useful.",
  "Rubbish timing? Not on our watch.",
  "Your neighbourhood's finest waste oracle.",
  "Keeping curbs classy since day one.",
  "May your bins always be where they belong.",
  "Wheelie good at this, if we do say so.",
  "Zero excuses for a missed collection.",
];

function fmtDate(d) {
  return d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
}

function buildBins(recycling, black) {
  let html = '<span class="bin-tag bin-food">🍎 Food waste</span>';
  if (recycling) html += '<span class="bin-tag bin-recycling">♻️ Recycling &amp; garden</span>';
  if (black) html += '<span class="bin-tag bin-black">🗑️ Black bin</span>';
  return html;
}

const PALETTE = { purple: '#6b2d8c', green: '#7cb342', black: '#1a1a1a' };

// Food waste goes out every collection, so purple is always the base tone;
// recycling/black bin colours join the blend on the weeks they're also due.
function accentStops(recycling, black) {
  const stops = [PALETTE.purple];
  if (recycling) stops.push(PALETTE.green);
  if (black) stops.push(PALETTE.black);
  return stops;
}

function gradientCss(stops) {
  return stops.length === 1 ? stops[0] : `linear-gradient(90deg, ${stops.join(', ')})`;
}

function setMascotGradient(stops) {
  const grad = document.getElementById('mascotGrad');
  grad.innerHTML = stops.length === 1
    ? `<stop offset="0%" stop-color="${stops[0]}"/><stop offset="100%" stop-color="${stops[0]}"/>`
    : stops.map((c, i) => `<stop offset="${(i / (stops.length - 1)) * 100}%" stop-color="${c}"/>`).join('');
}

function daysChip(days) {
  if (days === 0) return "Today!";
  if (days === 1) return "Tomorrow";
  return `In ${days} days`;
}

function setTagline(avoid) {
  const el = document.getElementById('tagline');
  let pick;
  do {
    pick = TAGLINES[Math.floor(Math.random() * TAGLINES.length)];
  } while (TAGLINES.length > 1 && pick === avoid);
  el.textContent = pick;
  el.dataset.current = pick;
}

function init() {
  const today = new Date();
  today.setHours(0,0,0,0);

  let next = null;
  for (const row of data) {
    const d = new Date(row[0] + 'T00:00:00');
    if (d >= today) { next = { d, recycling: row[1], black: row[2], xmas: row[3] }; break; }
  }

  const card = document.getElementById('nextCard');
  const mascotWrap = document.getElementById('mascotWrap');
  if (next) {
    const isToday = next.d.getTime() === today.getTime();
    const days = Math.round((next.d.getTime() - today.getTime()) / 86400000);
    const stops = accentStops(next.recycling, next.black);
    card.style.setProperty('--accent', gradientCss(stops));
    card.style.setProperty('--accent-solid', stops[stops.length - 1]);
    setMascotGradient(stops);
    card.innerHTML = `
      <div class="accent-bar"></div>
      ${isToday ? '<div class="today-banner">🚛 IT\'S BIN DAY! Bins out by 6am 🚛</div>' : ''}
      <div class="label">${isToday ? "Today's collection" : "Next collection"}</div>
      <div class="date-row">
        <span class="date">${fmtDate(next.d)}</span>
        <span class="days-chip">${daysChip(days)}</span>
      </div>
      <div class="bins">${buildBins(next.recycling, next.black)}</div>
      ${next.xmas ? '<div class="warning">⚠ Christmas period — council confirms exact date in December, this may shift</div>' : ''}
    `;
    mascotWrap.classList.toggle('celebrate', isToday);
    if (isToday) launchConfetti();
  } else {
    card.innerHTML = '<div class="label">No dates loaded</div><div class="date">Calendar ends 25 March 2027</div>';
  }

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = data.map(row => {
    const d = new Date(row[0] + 'T00:00:00');
    const isToday = d.getTime() === today.getTime();
    return `<tr class="${isToday ? 'today-row' : ''} ${row[3] ? 'orange-row' : ''}">
      <td>${d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })}</td>
      <td><span class="bin-icon food">🍎</span></td>
      <td>${row[1] ? '<span class="bin-icon recycling">♻️</span>' : ''}</td>
      <td>${row[2] ? '<span class="bin-icon black">🗑️</span>' : ''}</td>
    </tr>`;
  }).join('');

  setTagline();
}

function launchConfetti() {
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const canvas = document.getElementById('confettiCanvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const colors = ['#6b2d8c', '#7cb342', '#1a1a1a', '#e8720c'];
  const pieces = Array.from({ length: 60 }, () => ({
    x: Math.random() * canvas.width,
    y: -20 - Math.random() * canvas.height * 0.3,
    size: 5 + Math.random() * 6,
    speed: 2 + Math.random() * 3,
    drift: (Math.random() - 0.5) * 2,
    rotation: Math.random() * 360,
    spin: (Math.random() - 0.5) * 10,
    color: colors[Math.floor(Math.random() * colors.length)]
  }));

  let frame = 0;
  function tick() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      p.y += p.speed;
      p.x += p.drift;
      p.rotation += p.spin;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation * Math.PI / 180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
      ctx.restore();
    });
    frame++;
    if (frame < 150) {
      requestAnimationFrame(tick);
    } else {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  }
  tick();
}

function wobble(el) {
  el.classList.remove('spin-wobble');
  void el.offsetWidth;
  el.classList.add('spin-wobble');
}

function onActivate(el, handler) {
  el.addEventListener('click', (e) => handler(e.currentTarget));
  el.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      handler(e.currentTarget);
    }
  });
}

onActivate(document.getElementById('titleEl'), wobble);
onActivate(document.getElementById('mascotWrap'), wobble);
onActivate(document.getElementById('tagline'), (el) => setTagline(el.dataset.current));

function toggleTable() {
  const wrap = document.getElementById('tableWrap');
  const btn = document.querySelector('.toggle-btn');
  const showing = wrap.style.display === 'block';
  wrap.style.display = showing ? 'none' : 'block';
  btn.textContent = showing ? 'Show full calendar ▾' : 'Hide full calendar ▴';
}

init();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch((err) => console.warn("SW registration failed:", err));
  });
}
</script>

</body>
</html>
